<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/styles/lobby.css" />
  <link rel="shortcut icon" href="/assets/favicon/favicon.png" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nerko+One&family=Schoolbell&display=swap" rel="stylesheet" />
  <title>lobby page</title>
  <script type="module" src="/scripts/lobby.js"></script>
</head>

<body>
  <header">
    </header>
    <main>
      <section id="waiting-table">
        <section id="waiting-header">
          <h2>Room ID : <span id="room-id"> </span> <img src="/assets/icons/copy-icon.png" alt="copy"
              id="copy-btn"></span></h2>
          <h3 id="players-count">players : <span id="number"></span></h3>
          <div class="exit-button" src="/assets/background/exit.png"></div>

        </section>
        <section id="waiting-members">
          <ul></ul>
        </section>
      </section>

      <footer id="table-footer">
        <div class="loader"></div>
        <span id="waiting-msg"> waiting for host to start </span>
      </footer>
    </main>

    <template id="player-row">
      <li>
        <div class="player-profile"></div>
        <span class="player-name"></span> <span id="indication"></span>
      </li>
    </template>
</body>

</html>
