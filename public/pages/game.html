<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" href="/assets/favicon/favicon.png" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nerko+One&family=Schoolbell&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/game.css" />
  <link rel="stylesheet" href="/styles/research.css" />
  <link rel="stylesheet" href="/styles/vaccine.css" />
  <link rel="stylesheet" href="/styles/popup.css" />
  <link rel="stylesheet" href="/styles/flash_screen.css" />
  <title>Game</title>
  <script type="module" src="/scripts/game.js"></script>
  <template class="opponent-template">
    <div class="opponent">
      <div class="avatar">
        <p class="name"></p>
      </div>
    </div>
  </template>

  <template id="flash-screen-used-on-template">
    <div class="flash-screen flash-screen-affliction">
      <div class="actor">
        <div class="avatar">
          <p class="name"></p>
        </div>
      </div>
      <div class="attack-card">
        <h1></h1>
      </div>
      <div class="target">
        <div class="organ"><img /></div>
        <div class="avatar">
          <p class="name"></p>
        </div>
      </div>
      <div class="bar-container">
        <div class="bar"></div>
      </div>
    </div>
  </template>

  <template id="organ-card-template">
    <div class="organ">
      <img />
      <div class="affliction-markers">
        <img class="afflict-1" src="assets/icons/blood_drop.svg" alt="afflicted" />
        <img class="afflict-2" src="assets/icons/blood_drop.svg" alt="afflicted" />
        <img class="afflict-3" src="assets/icons/blood_drop.svg" alt="afflicted" />
      </div>
    </div>
  </template>
  <template id="attack-card-target">
    <div class="target-info">
      <div class="afflicts">
        <p>afflicts</p>
        <div></div>
      </div>
      <div class="removes">
        <p>removes</p>
        <div></div>
      </div>
    </div>
  </template>

  <template class="clinical-audit-popup">
    <div class="popup-players">
      <div class="clinical-popup">
        <div class="header">
          <div class="avatar">
            <p class="name"></p>
          </div>
          <div class="skip">
            <button class="skip-btn"></button>
          </div>
        </div>
        <div class="attack-cards"></div>
        <div class="footer">
          <button class="next-btn">
            <img src="assets/icons/next.svg" alt="svg" />
          </button>
        </div>
      </div>
    </div>
  </template>

  <template id="popup-organs-template">
    <div class="organs-popup">
      <div class="afflicts-organ">
        <p>afflicts</p>
        <div class="target-organs"></div>
      </div>
      <div class="removes-organ">
        <p>removes</p>
        <div class="target-organs"></div>
      </div>
    </div>
  </template>

  <template id="popup-players-template">
    <div class="players-popup">
      <div class="players">

      </div>
    </div>
  </template>

  <template id="player-template">
    <div class="player">

      <div class="avatar">
      </div>
      <p class="name"></p>
    </div>
  </template>

  <template id="attack-cards">
    <div class="attack-card">
      <div class="card-inner">
        <div class="card-front">
          <h1></h1>
          <button class="info-btn">i</button>
          <div class="target-info-container"></div>
          <img class="type" />
          <img class="instant" />
        </div>
        <div class="card-back">
          <button class="info-btn">i</button>
          <div class="card-desc"></div>
        </div>
      </div>
    </div>
  </template>

  <template id="research-template">
    <div id="research-container">
      <div id="left-panel"></div>
      <div id="filter">
        <h1>Types</h1>
        <ul id="types-list" type="none"></ul>
      </div>
    </div>
  </template>
</head>

<body>
  <main>
    <div class="opponent-area"></div>

    <div class="player-area">
      <div class="attack-cards"></div>

      <div class="organs"></div>

      <div class="player">
        <div class="avatar"></div>
        <p class="name">Template</p>
      </div>
    </div>
    <div class="popup"></div>
    <div class="flash-screen-container"></div>
  </main>
</body>

</html>
